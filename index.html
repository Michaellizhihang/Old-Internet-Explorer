<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Explorer 4.0 模拟器</title>
    <style>
        /* 重置与基础 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
        }

        body {
            background-color: #008080; /* Windows 95 青色 */
            overflow: hidden;
            height: 100vh;
            cursor: default;
        }

        /* 桌面图标 */
        .desktop-icons {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        .desktop-icon {
            width: 75px;
            text-align: center;
            color: white;
            font-size: 11px;
            cursor: pointer;
            user-select: none;
        }

        .desktop-icon:active .icon-img {
            filter: brightness(0.8);
        }

        .icon-img {
            width: 32px;
            height: 32px;
            background: #c0c0c0;
            margin: 0 auto 5px;
            border: 1px outset #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* IE4 窗口 */
        .ie-window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 600px;
            background: #c0c0c0;
            border: 2px outset #fff;
            box-shadow: 2px 2px 0 #000;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* 标题栏 */
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            cursor: move;
        }

        .title-bar-text::before {
            content: "🌐 ";
        }

        .window-controls button {
            width: 16px;
            height: 14px;
            background: #c0c0c0;
            border: 1px outset #fff;
            font-size: 10px;
            line-height: 12px;
            cursor: pointer;
            margin-left: 2px;
        }

        .window-controls button:active {
            border: 1px inset #fff;
        }

        /* 菜单栏 */
        .menu-bar {
            background: #c0c0c0;
            border-bottom: 1px solid #808080;
            padding: 2px 5px;
            font-size: 12px;
            display: flex;
            gap: 15px;
        }

        .menu-item {
            cursor: pointer;
            padding: 2px 5px;
        }

        .menu-item:hover {
            background: #000080;
            color: white;
        }

        .menu-item span {
            text-decoration: underline;
        }

        /* 工具栏 */
        .toolbar {
            background: #c0c0c0;
            border-bottom: 1px solid #808080;
            padding: 3px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .toolbar-button {
            width: 24px;
            height: 22px;
            background: #c0c0c0;
            border: 1px outset #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .toolbar-button:active {
            border: 1px inset #fff;
        }

        .address-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: white;
            border: 1px inset #808080;
            height: 22px;
            padding: 0 3px;
            font-size: 12px;
            margin-left: 10px;
        }

        .address-label {
            color: #808080;
            margin-right: 5px;
        }

        #url-input {
            border: none;
            outline: none;
            flex: 1;
            font-family: "MS Sans Serif", sans-serif;
            font-size: 12px;
        }

        /* 状态栏 */
        .status-bar {
            background: #c0c0c0;
            border-top: 1px solid #fff;
            padding: 2px 5px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #808080;
        }

        /* 主浏览区域 */
        .browser-view {
            flex: 1;
            background: white;
            border: 2px inset #c0c0c0;
            overflow: auto;
            position: relative;
        }

        /* 复古网站渲染样式 (HTML 3.2 模拟) */
        .retro-site {
            padding: 10px;
            font-family: "Times New Roman", Times, serif;
        }

        .retro-site table {
            border-collapse: separate;
            border-spacing: 2px;
        }

        .retro-site font[size="7"] { font-size: 48px; }
        .retro-site font[size="6"] { font-size: 32px; }
        .retro-site font[size="5"] { font-size: 24px; }
        .retro-site font[size="4"] { font-size: 18px; }
        .retro-site font[size="3"] { font-size: 16px; }
        .retro-site font[size="2"] { font-size: 12px; }
        .retro-site font[size="1"] { font-size: 10px; }

        .retro-site center { text-align: center; display: block; }
        
        .retro-site a { color: #0000EE; text-decoration: underline; cursor: pointer; }
        .retro-site a:visited { color: #551A8B; }
        
        .retro-site marquee {
            display: block;
            width: 100%;
        }

        .retro-site blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .retro-site hr {
            border: none;
            border-top: 2px groove #c0c0c0;
            margin: 10px 0;
        }

        .retro-site img {
            border: 0;
        }

        /* 特定网站样式 */
        .yahoo-96 {
            background: white;
        }
        
        .yahoo-96 .header {
            background: #000099;
            color: white;
            padding: 10px;
        }

        .geocities {
            background: black url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23000" width="100" height="100"/><circle fill="%23ff0" cx="50" cy="50" r="40"/></svg>');
            color: #0f0;
            font-family: "Comic Sans MS", cursive;
        }

        .netscape {
            background: #cccccc;
            font-family: Arial, sans-serif;
        }

        /* 加载动画 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }

        .loading-ie {
            width: 48px;
            height: 48px;
            border: 3px solid #c0c0c0;
            border-top: 3px solid #000080;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 错误页面 */
        .error-page {
            text-align: center;
            padding: 50px;
            font-family: "MS Sans Serif", sans-serif;
        }

        .error-page h1 {
            color: #000080;
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* 开始菜单 */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: #c0c0c0;
            border-top: 2px outset #fff;
            display: flex;
            align-items: center;
            padding: 2px;
            z-index: 100;
        }

        .start-button {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 2px 6px;
            background: #c0c0c0;
            border: 2px outset #fff;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            margin-right: 10px;
        }

        .start-button:active {
            border: 2px inset #fff;
        }

        .start-logo {
            width: 16px;
            height: 16px;
            background: #008080;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
        }

        .taskbar-time {
            margin-left: auto;
            border: 2px inset #c0c0c0;
            padding: 2px 10px;
            font-size: 12px;
        }

        /* 滚动条样式 (IE风格) */
        ::-webkit-scrollbar {
            width: 16px;
            height: 16px;
            background: #c0c0c0;
        }

        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border: 2px outset #fff;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #000;
        }

        ::-webkit-scrollbar-button {
            background: #c0c0c0;
            border: 2px outset #fff;
            width: 16px;
            height: 16px;
        }

        /* 弹出对话框 */
        .dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .dialog-box {
            background: #c0c0c0;
            border: 2px outset #fff;
            width: 300px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .dialog-title {
            background: #000080;
            color: white;
            padding: 3px 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .dialog-content {
            padding: 20px;
            font-size: 12px;
            text-align: center;
        }

        .dialog-buttons {
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .dialog-btn {
            padding: 4px 20px;
            background: #c0c0c0;
            border: 2px outset #fff;
            font-size: 12px;
            cursor: pointer;
            min-width: 75px;
        }

        .dialog-btn:active {
            border: 2px inset #fff;
        }

        .dialog-btn:focus {
            outline: 1px dotted #000;
            outline-offset: -4px;
        }
    </style>
</head>

        // 初始化
        window.onload = function() {
            updateClock();
            setInterval(updateClock, 1000);
            
            // 延迟一点加载以确保DOM完全就绪
            setTimeout(() => {
                loadSite('home.microsoft.com');
            }, 100);
        };

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            document.getElementById('clock').textContent = `${hours}:${minutes} ${ampm}`;
        }

        // 核心加载函数
        function loadSite(domain) {
            const contentDiv = document.getElementById('pageContent');
            const loadingDiv = document.getElementById('loadingIndicator');
            const statusText = document.getElementById('status-text');
            const urlInput = document.getElementById('url-input');
            
            // 显示加载
            loadingDiv.style.display = 'block';
            contentDiv.style.display = 'none';
            statusText.textContent = 'Connecting to ' + domain + '...';
            urlInput.value = 'http://' + domain + '/';
            
            // 模拟56k拨号延迟
            setTimeout(() => {
                const site = retroSites[domain];
                
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';
                
                if (site) {
                    contentDiv.innerHTML = site.content;
                    document.title = site.title;
                    statusText.textContent = 'Done';
                    
                    // 添加到历史
                    if (history.length === 0 || history[currentIndex] !== domain) {
                        currentIndex++;
                        history = history.slice(0, currentIndex);
                        history.push(domain);
                    }
                } else {
                    // 404 页面
                    contentDiv.innerHTML = `
                        <div class="error-page">
                            <h1>404 Not Found</h1>
                            <p>The page cannot be found</p>
                            <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
                            <br>
                            <p>Please try the following:</p>
                            <ul style="text-align:left; display:inline-block;">
                                <li>If you typed the page address in the Address bar, make sure that it is spelled correctly.</li>
                                <li>Open the <a href="#" onclick="goHome(); return false;">home page</a>, and then look for links to the information you want.</li>
                                <li>Click the <a href="#" onclick="navigateBack(); return false;">Back</a> button to try another link.</li>
                            </ul>
                            <br><br>
                            <p>HTTP 404 - File not found<br>Internet Explorer</p>
                        </div>
                    `;
                    statusText.textContent = 'Error: 404 Not Found';
                }
            }, 600);
        }

        // 导航到指定URL
        function navigateTo(url) {
            if (!url) return;
            
            // 清理URL
            url = url.replace('http://', '').replace('https://', '').replace(/\/.*/, '');
            loadSite(url);
        }

        function handleUrlSubmit(e) {
            if (e.key === 'Enter') {
                navigateToUrl();
            }
        }

        function navigateToUrl() {
            const url = document.getElementById('url-input').value;
            navigateTo(url);
        }

        function navigateBack() {
            if (currentIndex > 0) {
                currentIndex--;
                loadSite(history[currentIndex]);
            } else {
                showDialog('Navigation', 'Cannot go back. This is the first page in your history.');
            }
        }

        function navigateForward() {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                loadSite(history[currentIndex]);
            } else {
                showDialog('Navigation', 'Cannot go forward. This is the last page in your history.');
            }
        }

        function refreshPage() {
            if (currentIndex >= 0) {
                loadSite(history[currentIndex]);
            }
        }

        function stopLoading() {
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('pageContent').style.display = 'block';
            document.getElementById('status-text').textContent = 'Stopped';
        }

        function goHome() {
            loadSite('home.microsoft.com');
        }

        // 窗口控制
        function minimizeWindow() {
            const win = document.getElementById('ieWindow');
            win.style.display = 'none';
            setTimeout(() => {
                win.style.display = 'flex';
            }, 800);
        }

        function maximizeWindow() {
            const win = document.getElementById('ieWindow');
            if (!isMaximized) {
                originalPos = {
                    width: win.style.width,
                    height: win.style.height,
                    top: win.style.top,
                    left: win.style.left,
                    transform: win.style.transform
                };
                win.style.width = '100%';
                win.style.height = 'calc(100% - 28px)';
                win.style.top = '0';
                win.style.left = '0';
                win.style.transform = 'none';
                isMaximized = true;
            } else {
                win.style.width = originalPos.width || '800px';
                win.style.height = originalPos.height || '600px';
                win.style.top = originalPos.top || '50%';
                win.style.left = originalPos.left || '50%';
                win.style.transform = originalPos.transform || 'translate(-50%, -50%)';
                isMaximized = false;
            }
        }

        function closeWindow() {
            showDialog('Confirm', 'Are you sure you want to close Internet Explorer?', true);
        }

        // 拖动功能
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        document.getElementById('titleBar').addEventListener('mousedown', function(e) {
            if (isMaximized) return;
            isDragging = true;
            const win = document.getElementById('ieWindow');
            const rect = win.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
        });

        document.addEventListener('mousemove', function(e) {
            if (isDragging) {
                e.preventDefault();
                const win = document.getElementById('ieWindow');
                win.style.left = (e.clientX - dragOffsetX) + 'px';
                win.style.top = (e.clientY - dragOffsetY) + 'px';
                win.style.transform = 'none';
            }
        });

        document.addEventListener('mouseup', function() {
            isDragging = false;
        });

        // 对话框系统
        let dialogCallback = null;

        function showDialog(title, content, isConfirm = false) {
            document.getElementById('dialogTitle').textContent = title;
            document.getElementById('dialogContent').textContent = content;
            document.getElementById('dialogOverlay').style.display = 'flex';
            
            const btnContainer = document.querySelector('.dialog-buttons');
            btnContainer.innerHTML = '';
            
            if (isConfirm) {
                const yesBtn = document.createElement('button');
                yesBtn.className = 'dialog-btn';
                yesBtn.textContent = 'Yes';
                yesBtn.onclick = function() {
                    closeDialog();
                    document.getElementById('ieWindow').style.display = 'none';
                    setTimeout(() => {
                        alert('It is now safe to turn off your computer.');
                        location.reload();
                    }, 1000);
                };
                
                const noBtn = document.createElement('button');
                noBtn.className = 'dialog-btn';
                noBtn.textContent = 'No';
                noBtn.onclick = closeDialog;
                
                btnContainer.appendChild(yesBtn);
                btnContainer.appendChild(noBtn);
            } else {
                const okBtn = document.createElement('button');
                okBtn.className = 'dialog-btn';
                okBtn.textContent = 'OK';
                okBtn.onclick = closeDialog;
                btnContainer.appendChild(okBtn);
            }
        }

        function closeDialog() {
            document.getElementById('dialogOverlay').style.display = 'none';
        }

        function toggleStartMenu() {
            showDialog('Start Menu', 'Programs\n├── Accessories\n├── Internet Explorer\n├── MS-DOS Prompt\n└── Windows Explorer\n\nDocuments\nSettings\nFind\nHelp\nRun...\n\nShut Down...');
        }

        // 防止右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            showDialog('Error', 'Context menu not available in IE4 mode');
        });
    </script>
